<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="version" content="1.0.1-no-signup">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack | Login</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-darkBg text-white antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-cardBg rounded-2xl shadow-2xl p-8 border border-gray-700 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>

        <div class="text-center mb-8">
            <h1
                class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary mb-2">
                DevTrack</h1>
            <p class="text-gray-400 text-sm" id="form-subtitle">Sign in to track your progress</p>
        </div>

        <div class="mb-5 grid grid-cols-2 gap-3">
            <button type="button" onclick="quickLogin('student@devtrack.com', 'password123')"
                class="px-3 py-2.5 bg-gray-800 hover:bg-gray-700/80 border border-gray-600 rounded-lg text-sm text-gray-200 font-medium transition-colors shadow-sm focus:ring-2 focus:ring-primary focus:outline-none">
                <i class="fas fa-user-graduate mr-2 text-primary"></i>Student Login
            </button>
            <button type="button" onclick="quickLogin('admin@devtrack.com', 'password123')"
                class="px-3 py-2.5 bg-gray-800 hover:bg-gray-700/80 border border-gray-600 rounded-lg text-sm text-gray-200 font-medium transition-colors shadow-sm focus:ring-2 focus:ring-secondary focus:outline-none">
                <i class="fas fa-chalkboard-teacher mr-2 text-secondary"></i>Teacher Login
            </button>
        </div>

        <div class="relative flex items-center mb-6">
            <div class="flex-grow border-t border-gray-700"></div>
            <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase tracking-wider font-semibold">or enter
                details</span>
            <div class="flex-grow border-t border-gray-700"></div>
        </div>

        <form id="auth-form" class="space-y-5">
            <!-- Form Fields -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full bg-darkBg border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="you@example.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-darkBg border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-primary hover:bg-purple-600 text-white font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-primary/30">
                Sign In
            </button>
        </form>

        <div id="error-message"
            class="hidden mt-4 text-center text-red-400 text-sm bg-red-400/10 py-2 rounded-lg border border-red-500/20">
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
