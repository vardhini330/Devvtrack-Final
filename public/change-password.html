<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack | Change Password</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-darkBg text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-cardBg w-full max-w-md p-8 rounded-2xl border border-gray-700 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary mb-2">Security Update</h1>
            <p class="text-gray-400">Please change your initial password to continue.</p>
        </div>

        <form id="change-password-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">New Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3.5 text-gray-500"></i>
                    <input type="password" id="new-password" required minlength="6"
                        class="w-full bg-darkBg border border-gray-600 rounded-xl px-10 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="Minimum 6 characters">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Confirm New Password</label>
                <div class="relative">
                    <i class="fas fa-check-double absolute left-3 top-3.5 text-gray-500"></i>
                    <input type="password" id="confirm-password" required minlength="6"
                        class="w-full bg-darkBg border border-gray-600 rounded-xl px-10 py-3 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                        placeholder="Re-type password">
                </div>
            </div>

            <div id="error-msg" class="hidden text-sm text-red-400 bg-red-400/10 p-3 rounded-lg border border-red-500/20"></div>

            <button type="submit" id="submit-btn"
                class="w-full py-3 bg-primary hover:bg-purple-600 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/30 flex items-center justify-center">
                <span>Update Password & Continue</span>
            </button>
        </form>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('change-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Updating...';
            errorMsg.classList.add('hidden');

            try {
                const token = localStorage.getItem('token');
                if (!token) throw new Error('Session expired. Please login again.');

                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ newPassword })
                });

                const data = await response.json();
                if (data.success) {
                    // Update stored user data if needed
                    const user = JSON.parse(localStorage.getItem('user'));
                    user.isFirstLogin = false;
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    window.location.href = '/index.html';
                } else {
                    throw new Error(data.message || 'Failed to update password');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Update Password & Continue';
            }
        });
    </script>
</body>
</html>
